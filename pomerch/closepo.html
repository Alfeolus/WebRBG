<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>PO Merch Closed - Restored By God</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&family=Montserrat:wght@700;800;900&display=swap" rel="stylesheet">
    
    <script src="https://unpkg.com/@dotlottie/player-component@latest/dist/dist/dotlottie-player.mjs" type="module"></script>

    <style>
        :root {
            --bg-base: #06090F; 
            --bg-surface: #FFFFFF; 
            --text-on-dark: #FFFFFF;
            --accent-purple: #A855F7;
            --accent-cyan: #22D3EE; 
            --accent-orange: #FB923C; 
            --border-thick: 3px solid #0F172A; 
            --font-main: 'Plus Jakarta Sans', sans-serif;
            --font-titles: 'Montserrat', sans-serif; 
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body { 
            font-family: var(--font-main); 
            background-color: var(--bg-base);
            color: var(--text-on-dark);
            overflow: hidden; 
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
        }

        .pastel-blobs {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            z-index: -1;
            overflow: hidden;
            filter: blur(80px);
            opacity: 0.7;
        }

        .blob {
            position: absolute;
            border-radius: 50%;
            animation: move 20s infinite alternate ease-in-out;
        }

        .blob-purple { 
            background: var(--accent-purple); 
            width: 500px; height: 500px; 
            top: -10%; left: -10%; 
            animation-duration: 18s;
        }

        .blob-cyan { 
            background: var(--accent-cyan); 
            width: 450px; height: 450px; 
            bottom: -5%; right: -5%; 
            animation-duration: 25s;
            animation-delay: -2s;
        }

        .blob-orange { 
            background: var(--accent-orange); 
            width: 350px; height: 350px; 
            top: 40%; left: 50%; 
            animation-duration: 22s;
            animation-delay: -5s;
        }

        @keyframes move {
            0% { transform: translate(0, 0) scale(1); }
            33% { transform: translate(30px, -50px) scale(1.1); }
            66% { transform: translate(-20px, 20px) scale(0.9); }
            100% { transform: translate(0, 0) scale(1); }
        }

        .container {
            width: 92%;
            max-width: 480px;
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            padding: 50px 30px;
            border-radius: 40px;
            box-shadow: 0 40px 100px rgba(0, 0, 0, 0.6);
            text-align: center;
            position: relative;
            z-index: 10;
        }

        h1 {
            font-family: var(--font-titles);
            font-weight: 900;
            font-size: 2.2em;
            letter-spacing: -1px;
            margin-bottom: 8px;
            text-transform: uppercase;
        }

        .status-tag {
            display: inline-block;
            background: var(--accent-orange);
            color: #000;
            padding: 6px 18px;
            border-radius: 12px;
            font-weight: 800;
            font-size: 0.85em;
            margin-bottom: 25px;
            border: 2px solid #000;
            transform: rotate(-1.5deg);
        }

        .lottie-box {
            width: 100%;
            max-width: 220px;
            margin: 0 auto 25px;
        }

        .message {
            font-size: 1.1em;
            line-height: 1.5;
            color: rgba(255, 255, 255, 0.8);
            margin-bottom: 35px;
        }

        .highlight {
            color: var(--accent-cyan);
            font-weight: 700;
        }

        .btn-instagram {
            display: inline-block;
            background: var(--bg-surface);
            color: #000;
            text-decoration: none;
            padding: 16px 32px;
            border-radius: 16px;
            font-weight: 800;
            font-family: var(--font-titles);
            text-transform: uppercase;
            border: var(--border-thick);
            box-shadow: 5px 5px 0px var(--accent-purple);
            transition: 0.2s ease;
        }

        .btn-instagram:hover {
            transform: translate(-2px, -2px);
            box-shadow: 7px 7px 0px var(--accent-purple);
        }

        .footer-note {
            margin-top: 30px;
            font-size: 0.8em;
            opacity: 0.4;
            font-weight: 600;
        }
    </style>
</head>
<body>

    <div class="pastel-blobs">
        <div class="blob blob-purple"></div>
        <div class="blob blob-cyan"></div>
        <div class="blob blob-orange"></div>
    </div>

    <div class="container">
        <h1>RESTORED BY GOD</h1>
        <div class="status-tag">PRE-ORDER CLOSED</div>

        <div class="lottie-box">
            <dotlottie-player 
                src="https://lottie.host/82672a83-a442-4b2e-9d29-c99459585697/mD4m3H5j9K.json" 
                background="transparent" 
                speed="1" 
                loop 
                autoplay>
            </dotlottie-player>
        </div>

        <p class="message">
            Waduh, pemesanan sudah ditutup!<br>
            Saat ini semua pesanan sedang dalam <br>
            <span class="highlight">Tahap Proses.</span>
        </p>

        <a href="https://instagram.com/retreatpptippbp" class="btn-instagram" target="_blank">
            Cek Update di Instagram
        </a>

        <p class="footer-note">
            Sampai jumpa di Acara Restored by God!
        </p>
    </div>

</body>
</html>
