<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard - PO Merch RBG</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@700;800;900&display=swap" rel="stylesheet">
    
    <link rel="stylesheet" href="/pomerch/admin.css">
</head>
<body>
    <div class="pastel-blobs">
        <div class="blob blob-purple"></div>
        <div class="blob blob-cyan"></div>
        <div class="blob blob-orange"></div>
    </div>

    <div id="login-overlay" class="login-overlay">
        <div class="login-box">
            <h2>Yang admin admin aja</h2>
            <input type="password" id="admin-password" placeholder="Isi password">
            <button id="btn-login" class="action-btn">Masuk Dashboard</button>
            <p id="login-error" style="color: var(--danger); display: none; margin-top: 15px; font-weight: 800;">❌ Password Salah!</p>
        </div>
    </div>

    <div class="admin-layout" id="admin-dashboard" style="display: none;">
        <aside class="sidebar">
            <h2>RBG Admin</h2>
            <ul class="nav-menu">
                <li class="active">Dashboard</li>
                <li id="btn-logout">Logout System</li>
            </ul>
        </aside>

        <main class="main-content">
            <header>
                <h1>Ringkasan Pesanan</h1>
                <button id="btn-refresh" class="action-btn outline">🔄 Refresh Data</button>
            </header>

            <div class="stats-grid">
                <div class="stat-card">
                    <h3>Total Pesanan</h3>
                    <p id="stat-total-orders">0</p>
                </div>
                <div class="stat-card">
                    <h3>Total Pemasukan</h3>
                    <p id="stat-revenue">Rp 0</p>
                </div>
                <div class="stat-card">
                    <h3>Menunggu Pembayaran</h3>
                    <p id="stat-pending">0</p>
                </div>
            </div>

            <div class="table-container">
                <table id="orders-table">
                    <thead>
                        <tr>
                            <th>Order ID</th>
                            <th>Nama & Kelas</th>
                            <th>No. WhatsApp</th>
                            <th>Detail Pesanan</th>
                            <th>Total Bayar</th>
                            <th>Status</th>
                            <th>Aksi</th>
                        </tr>
                    </thead>
                    <tbody id="orders-body">
                    </tbody>
                </table>
            </div>
        </main>
    </div>

    <script src="/pomerch/admin.js"></script>
</body>
</html>
